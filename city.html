<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8">
<title>VeszprémBusz — Veszprém helyi járatok</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#FFF7EC">
<link rel="icon" type="image/svg+xml" href="favicon.svg">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@600;700;800;900&display=swap" rel="stylesheet">

<script>window.APP_VERSION = "v3.15";</script>
<link rel="stylesheet" href="styles.css?v=v3.15">

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script>
  document.write(
    ["data.js","city-data.js","walk-graph.js","city-planner.js","city-shapes.js","i18n.js"]
    .map(function(s){ return '<script src="'+s+'?v='+window.APP_VERSION+'"><\/script>'; })
    .join("")
  );
</script>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script type="text/babel" src="timetable-modal.jsx"></script>

<style>
.stop-option:hover { background: var(--bg); }
.city-form-row { display: flex; gap: 10px; align-items: stretch; flex-wrap: wrap; margin-bottom: 10px; }
.city-swap-btn {
  background: var(--line); color: var(--ink); border: none; border-radius: 12px;
  padding: 0 14px; font-size: 18px; cursor: pointer; font-weight: 800;
  transition: all 0.15s; flex-shrink: 0; align-self: center;
}
.city-swap-btn:hover { background: var(--ink); color: white; transform: scale(1.1); }
.city-stop-label { font-size: 12px; font-weight: 800; color: var(--ink-soft); text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 5px; }
.city-stop-wrapper { flex: 1; min-width: 180px; }
.city-results-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; }
@media (max-width: 1100px) { .city-results-grid { grid-template-columns: repeat(2, 1fr); } }
@media (max-width: 700px) {
  .city-results-grid { grid-template-columns: 1fr; }
  .v1 { padding: 14px; padding-bottom: 180px; }
  .city-form-row { flex-direction: column; gap: 6px; margin-bottom: 8px; }
  .city-swap-btn { width: auto; padding: 5px 18px; align-self: center; font-size: 16px; }
  .city-stop-label { font-size: 10px; margin-bottom: 3px; }
  .city-header-timetable { display: none !important; }
  .city-hero-banner { padding: 10px 14px; margin-bottom: 12px; }
  .city-form-mobile .v1-time-input { font-size: 12px; padding: 6px 9px; border-radius: 8px; }
  .city-form-mobile .v1-btn { font-size: 12px; padding: 8px 12px; border-radius: 10px; justify-content: center; }
}
.city-empty {
  grid-column: 1 / -1; text-align: center; padding: 60px 20px;
  background: white; border-radius: var(--radius); box-shadow: var(--shadow);
}
.city-bus-badge {
  display: inline-flex; align-items: center; justify-content: center;
  width: 36px; height: 36px; border-radius: 50%;
  color: white; font-weight: 900; font-size: 13px;
  flex-shrink: 0;
}
.city-hero-banner {
  background: linear-gradient(135deg, #26A69A 0%, #00796B 100%);
  color: white; padding: 18px 24px; border-radius: var(--radius);
  margin-bottom: 18px; display: flex; justify-content: space-between;
  align-items: center; box-shadow: var(--shadow); gap: 16px;
}
</style>
</head>
<body style="padding:0;">

<div id="root"></div>

<script type="text/babel" data-presets="react" src="city-app.jsx"></script>
</body>
</html>
