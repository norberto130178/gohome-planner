<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8">
<title>HazaÚt — Playful Timeline</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#FFF7EC">
<link rel="icon" type="image/svg+xml" href="favicon.svg">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@600;700;800;900&display=swap" rel="stylesheet">

<script>window.APP_VERSION = "v3.10";</script>
<link rel="stylesheet" href="styles.css?v=v3.10">

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script>
  document.write(
    ["schedules.js","intercity-data.js","city-data.js","city-shapes.js","home-shapes.js",
     "walk-graph.js","data.js","schools.js","city-planner.js","i18n.js"]
    .map(function(s){ return '<script src="'+s+'?v='+window.APP_VERSION+'"><\/script>'; })
    .join("")
  );
</script>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script type="text/babel" src="timetable-modal.jsx"></script>
<script type="text/babel" src="route-card.jsx"></script>
<script type="text/babel" src="app-state.jsx"></script>
<script type="text/babel" src="variation-1.jsx"></script>
</head>
<body style="padding:0;">

<div id="root"></div>

<script type="text/babel" data-presets="react">
function App() {
  const { state, setState, t, setLang } = window.useAppState();
  const lang = state.lang;
  const [timetableBusId, setTimetableBusId] = React.useState(null);

  return (
    <>
      <window.V1Variation state={state} setState={setState} t={t} langSwitcher={
        <div style={{display:"flex",gap:4,alignItems:"center"}}>
          <button className="tweaks-pill" data-tooltip="Magyar" style={lang==="hu"?{background:"var(--accent)",color:"white"}:{}} onClick={() => setLang("hu")}>HU</button>
          <button className="tweaks-pill" data-tooltip="English" style={lang==="en"?{background:"var(--accent)",color:"white"}:{}} onClick={() => setLang("en")}>EN</button>
        </div>
      } />
      {timetableBusId && <window.BusTimetableModal busId={timetableBusId} onClose={() => setTimetableBusId(null)} />}
      <div className="nav-bottom">
        <a href="city.html" style={{
          flex:1, display:"flex", flexDirection:"column", alignItems:"center",
          justifyContent:"center", gap:3, textDecoration:"none",
          borderTop:"2px solid transparent", background:"#00695C",
        }}>
          <span style={{display:"flex", alignItems:"center", gap:5, lineHeight:1}}>
            <span style={{fontSize:17}}>🚌</span>
            <span style={{fontSize:18, fontWeight:900, color:"white", fontFamily:"Nunito,sans-serif"}}>→</span>
          </span>
          <span style={{fontSize:10, fontWeight:700, fontFamily:"Nunito,sans-serif", color:"rgba(255,255,255,0.8)", letterSpacing:"0.02em"}}>VeszprémBusz</span>
        </a>
        <window.TimetableDropdown onSelect={id => setTimetableBusId(id)} upward tabStyle bgColor="#1e3a5a" />
      </div>
    </>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
