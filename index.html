<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8">
<title>HazaÚt — Playful Timeline</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#FFF7EC">
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<link rel="manifest" href="/manifest.json">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@600;700;800;900&display=swap" rel="stylesheet">

<script>window.APP_VERSION = "v3.17";</script>
<link rel="stylesheet" href="styles.css?v=v3.17">

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script>
  document.write(
    ["schedules.js","intercity-data.js","city-data.js","city-shapes.js","home-shapes.js",
     "walk-graph.js","data.js","schools.js","city-planner.js","i18n.js"]
    .map(function(s){ return '<script src="'+s+'?v='+window.APP_VERSION+'"><\/script>'; })
    .join("")
  );
</script>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script type="text/babel" src="timetable-modal.jsx"></script>
<script type="text/babel" src="route-card.jsx"></script>
<script type="text/babel" src="app-state.jsx"></script>
<script type="text/babel" src="variation-1.jsx"></script>
</head>
<body style="padding:0;">

<a href="#root" class="skip-link">Ugrás a tartalomhoz</a>
<div id="root" tabindex="-1"></div>

<script type="text/babel" data-presets="react">
function App() {
  const { state, setState, t, setLang } = window.useAppState();
  const lang = state.lang;
  const [timetableBusId, setTimetableBusId] = React.useState(null);

  return (
    <>
      <window.V1Variation state={state} setState={setState} t={t} onTimetable={id => setTimetableBusId(id)} langSwitcher={
        <div style={{display:"flex",gap:4,alignItems:"center"}}>
          <button className="tweaks-pill" data-tooltip="Magyar" style={lang==="hu"?{background:"var(--accent)",color:"white"}:{}} onClick={() => setLang("hu")}>HU</button>
          <button className="tweaks-pill" data-tooltip="English" style={lang==="en"?{background:"var(--accent)",color:"white"}:{}} onClick={() => setLang("en")}>EN</button>
        </div>
      } />
      {timetableBusId && <window.BusTimetableModal busId={timetableBusId} onClose={() => setTimetableBusId(null)} lang={lang} />}
    </>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>

<script>
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => navigator.serviceWorker.register('/sw.js'));
  }
</script>
</body>
</html>
